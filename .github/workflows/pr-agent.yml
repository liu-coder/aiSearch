name: PR-Agent - AI Code Review

# ============================================================
# PR-Agent GitHub Actions 工作流
# 触发条件：PR 创建、重新打开、标记为 ready for review
#          或在 PR 中评论时
# ============================================================

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: PR Agent action step
        id: pragent
        uses: Codium-ai/pr-agent@main
        env:
          # 通过 OpenAI 兼容协议接入 DeepSeek
          # LiteLLM 读取的是 OPENAI_API_KEY，把仓库 secret OPENAI_KEY 映射过来即可
          # 同时给 PR-Agent 自身保留 OPENAI_KEY，二者都指向同一个 secret
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
