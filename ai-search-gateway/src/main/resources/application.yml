server:
  port: 18080

spring:
  application:
    name: ai-search-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        import-check:
          enabled: false
    gateway:
      routes:
        - id: search-service
          uri: http://localhost:18081
          predicates:
            - Path=/api/search/**
        - id: video-service
          uri: http://localhost:18082
          predicates:
            - Path=/api/videos/**
        - id: worker-service
          uri: http://localhost:18083
          predicates:
            - Path=/api/workflows/**
        - id: model-service
          uri: http://localhost:18084
          predicates:
            - Path=/api/models/**
  config:
    import:
      - optional:nacos:ai-search-common.yaml
      - optional:nacos:${spring.application.name}.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
