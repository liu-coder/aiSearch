# ============================================================
# PR-Agent 配置文件 - Spring Cloud Alibaba 项目
# 文件名：.pr_agent.toml
# 放置位置：项目根目录
# ============================================================

# ============================================================
[config]
# ============================================================
# 通过 LiteLLM 原生 DeepSeek provider 接入。
# API Key 通过 GitHub Actions 环境变量 DEEPSEEK_API_KEY 注入。
model = "deepseek/deepseek-chat"
# fallback 使用不同模型才有意义；deepseek-reasoner 推理能力更强作为兜底
fallback_models = ["deepseek/deepseek-reasoner"]

# deepseek-chat 上下文 64K，必须显式声明，否则 LiteLLM 估算出错
custom_model_max_tokens = 65536
max_model_tokens = 64000
ai_timeout = 300

# clip：超长 PR 截断处理，适合大仓库；如需摘要可改为 "summarize"
large_patch_policy = "clip"

# 让 AI 用中文输出 Review 评论
response_language = "zh-CN"

temperature = 0.2
max_tokens = 4000

# 生产环境用 INFO，DEBUG 会输出大量日志拖慢 Actions
verbosity_level = 1
log_level = "INFO"


# ============================================================
[github_action_config]
# ============================================================
# auto_improve 成本较高（多轮调用），仅在 PR 首次开启时运行
# synchronize（每次 push）不触发 improve，避免重复消耗 API
auto_review   = true
auto_describe = true
auto_improve  = false   # 按需手动评论 /improve 触发，控制成本

# 去掉 synchronize：每次推代码不自动跑全套
# 增量 review 通过 enable_incremental_review 控制（见下方）
pr_actions = ["opened", "reopened", "ready_for_review", "review_requested","synchronize"]

# 注意：[github_app] 块已删除。
# 你使用的是 GitHub Actions，不是 GitHub App 安装方式。
# 保留 [github_app] 会导致 push_commands 与 Actions 双重触发。


# ============================================================
[pr_reviewer]
# ============================================================
enable                  = true
enable_ask_questions    = true
require_tests_review    = true
require_security_review = true
require_focused_review  = false

# 每文件最多 5 个发现，每 PR 最多 4 个建议，避免信息轰炸
max_findings_per_file = 5
num_code_suggestions  = 4

# 开启增量 review：synchronize 事件只审查新增提交，大幅节省 Token
enable_incremental_review = true

# 最大调用次数从 50 降到 20，防止单次 PR 费用失控
max_calls_allowed = 20

# 关闭 review 完成后的总结消息，30 人团队 PR 频繁时减少噪音
final_update_message = false

# 不开启自动通过，人工最终决策
enable_auto_approval = false

# -----------------------------------------------------------
# 针对 Spring Cloud Alibaba 项目的自定义检查规则
# -----------------------------------------------------------
extra_instructions = """
你是一个资深的 Java 后端工程师，正在对 Spring Cloud Alibaba 项目做代码 Review。
请重点检查以下问题，并用中文给出简洁明确的评论：

【必须检查 - 严重问题】
1. @Transactional 注解使用问题：
   - 是否加在了 private 方法上（无效）
   - 是否加在了 Controller 层（不规范）
   - 事务方法内有远程调用（Feign）时需要提醒风险

2. 空指针风险：
   - 对象使用前未做 null 检查
   - Optional 未正确处理
   - 集合操作前未判空

3. Feign 调用问题：
   - 是否配置了 fallback 或 fallbackFactory
   - 是否有重试策略考虑（避免非幂等接口重试）

4. 资源泄漏：
   - 数据库连接/流未关闭（应使用 try-with-resources）
   - 线程池使用后未正确关闭

【建议检查 - 一般问题】
5. 日志规范：
   - 不允许使用 System.out.println，必须用 @Slf4j + log.xxx
   - 日志级别是否合适（敏感信息不能 info 级别打出）
   - 日志中是否携带足够的追踪信息（traceId / 业务ID）

6. 异常处理：
   - 不允许 catch(Exception e) {} 空处理
   - 业务异常是否都继承了统一的 BizException
   - 异常信息是否有意义（不能只有 "error"）

7. 接口规范：
   - 返回值是否统一用 Result<T> 包装
   - 分页接口是否限制了最大 pageSize（防止大查询）
   - 写接口（POST/PUT/DELETE）是否考虑幂等性

8. 性能隐患：
   - 循环内是否有数据库查询（N+1 问题）
   - 大集合操作是否有内存溢出风险
   - 是否使用了低效的数据结构

【不需要评论的内容】
- 代码格式、缩进（交给 Checkstyle 处理）
- 变量命名的主观偏好
- 已有注释说明了特殊处理原因的地方
- 测试代码中的规范问题（宽松对待）
"""


# ============================================================
[pr_description]
# ============================================================
enable                        = true
publish_description_as_comment = false   # 直接更新 PR 描述，不发评论
add_original_user_description = true     # 保留用户原始描述
generate_ai_title             = false    # 不覆盖标题

extra_instructions = """
请用中文生成 PR 描述，格式如下：

## 变更概述
（一句话说明这个 PR 做了什么）

## 变更内容
- 功能变更：（列出主要功能变化）
- 影响范围：（影响哪些服务/接口/表）

## 测试说明
（是否有单测，如何验证）

## 注意事项
（上线/联调需要注意的点，如新增配置项、数据库变更等）
"""


# ============================================================
[pr_code_suggestions]
# ============================================================
num_code_suggestions_per_chunk = 3
max_number_of_calls            = 3
focus_only_on_problems         = true

# 设为 5 过滤掉低置信度建议，减少噪音；原来 0 会全量输出
suggestions_score_threshold    = 5

publish_output_no_suggestions  = true
commitable_code_suggestions    = false
dual_publishing_score_threshold = -1

# DeepSeek API 并发下容易触发限流，串行更稳定
parallel_calls = false


# ============================================================
[pr_questions]
# ============================================================
enable = true


# ============================================================
[pr_add_docs]
# ============================================================
enable = true


# ============================================================
[pr_custom_labels]
# ============================================================
enable = false